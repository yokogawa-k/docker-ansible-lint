version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    assignees:
      - yokogawa-k
    labels:
      - dependencies
    # NOTE:
    # Docker ecosystem updates only cover image tags such as FROM.
    # Pinned APK package versions in Dockerfile RUN commands are maintained manually.
